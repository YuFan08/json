unified-delay: true
disable-keep-alive: false
keep-alive-idle: 15
keep-alive-interval: 15
tcp-concurrent: true
find-process-mode: strict
geodata-mode: true
geo-auto-update: true
geo-update-interval: 24
external-controller: 127.0.0.1:9000

profile:
  store-selected: true
  store-fake-ip: true

dns:
  enable: true
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  listen: 127.0.0.1:1053
  prefer-h3: false
  use-hosts: true
  use-system-hosts: true

  cache-algorithm: arc
  cache-size: 4096

  fake-ip-filter:
    - "+.stun.*.*"
    - "+.nip.io"
    - "+.local"
    - "+.lan"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "+.time.*.com"
    - "+.time.*.gov"
    - "+.ntp.org.cn"
    - "+.pool.ntp.org"
    - "+.bilibili.com"
    - "+.mcdn.bilivideo.cn"
    - "+.ghoffice.com"
    - "+.localhost.ptlogin2.qq.com"
    - "+.home.arpa"
    - "+.localdomain"
    - "+.test"
    - "xbox.*.microsoft.com"
    - "+.xboxlive.com"
    - "+.playstation.net"
    - "+.playstation.com"
    - "GEOSITE:private"

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  nameserver-policy:
    "geosite:cn,private":
      - 223.5.5.5
      - 119.29.29.29
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "geosite:geolocation-!cn":
      - https://1.1.1.1/dns-query#🦋 自动链接
      - https://8.8.8.8/dns-query#🦋 自动链接

tun:
  enable: true
  stack: mixed
  auto-route: true
  strict-route: true
  auto-detect-interface: true
  auto-mtu: true
  dns-hijack:
    - any:53
    - tcp://any:53

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: false
  sniff:
    HTTP:
      ports: [80, 8080, 8880, 2052, 2082, 2086, 2095]
      override-destination: true
    TLS:
      ports: [443, 8443, 2053, 2083, 2087, 2096]
      override-destination: true
    QUIC:
      ports: [443, 8443]
      override-destination: true

proxy-providers:
  Local-Pool:
    type: file
    path: ./local.yaml

proxy-groups:
  - name: "📺 YouTube"
    type: select
    proxies:
      - 🇺🇸 US
      - 🇯🇵 Japan
      - 🇸🇬 SG
      - 🇭🇰 HK
      - 🇧🇬 Bulgaria

  - name: "🇺🇸 US"
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 20
    use:
      - Local-Pool
    filter: "🇺🇸"

  - name: "🇧🇬 Bulgaria"
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 20
    use:
      - Local-Pool
    filter: "🇧🇬"

  - name: "🇯🇵 Japan"
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 20
    use:
      - Local-Pool
    filter: "🇯🇵"

  - name: "🇭🇰 HK"
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 20
    use:
      - Local-Pool
    filter: "🇭🇰"

  - name: "🇸🇬 SG"
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 20
    use:
      - Local-Pool
    filter: "🇸🇬"

  - name: "🦋 自动链接"
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 20
    use:
      - Local-Pool
    filter: "hy2|tu5"

  - name: "🎉 Living"
    type: select
    proxies:
      - 🇺🇸 US
      - 🇧🇬 Bulgaria
      - 🇭🇰 HK

  - name: "🎈 US/JP"
    type: load-balance
    strategy: round-robin
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 20
    lazy: true
    use:
      - Local-Pool
    filter: "🇺🇸|🇯🇵"

  - name: "🎞️ SG/HK"
    type: load-balance
    strategy: round-robin
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 20
    lazy: true
    use:
      - Local-Pool
    filter: "(🇸🇬|🇭🇰).*(hy2|tu5)"

  - name: "🌍 节点选择"
    type: select
    use:
      - Local-Pool
    filter: "hy2|tu5"

rules:
  - GEOSITE,category-ads-all,REJECT
  - OR,((DOMAIN-KEYWORD,lax.live.mmcdn)),🎈 US/JP
  - DOMAIN-KEYWORD,sin.live.mmcdn,🎞️ SG/HK
  - OR,((DOMAIN-KEYWORD,sof.live.mmcdn),(DOMAIN-KEYWORD,plex),(DOMAIN-KEYWORD,chunshi)),🇧🇬 Bulgaria
  - OR,((DOMAIN-KEYWORD,jav),(DOMAIN-KEYWORD,dmm),(DOMAIN-KEYWORD,mgstage)),🇯🇵 Japan
  - OR,((DST-PORT,22),(DST-PORT,2222),(DOMAIN-KEYWORD,chunxi)),DIRECT
  - OR,((DOMAIN-KEYWORD,chaturbate),(DOMAIN-KEYWORD,highwebmedia)),🎉 Living
  - GEOSITE,youtube,📺 YouTube
  - OR,((GEOSITE,google),(GEOSITE,openai),(GEOSITE,xai),(GEOSITE,anthropic),(GEOSITE,cursor)),🇺🇸 US
  - OR,((GEOSITE,cloudflare),(GEOSITE,microsoft),(GEOSITE,meta)),🌍 节点选择
  - GEOIP,lan,DIRECT,no-resolve
  - GEOSITE,CN,DIRECT
  - MATCH,🦋 自动链接

ntp:
  enable: true
  server: ntp.aliyun.com
  port: 123
  interval: 1800
